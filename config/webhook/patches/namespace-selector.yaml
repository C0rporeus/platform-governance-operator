# Exclude system namespaces from Pod webhooks to avoid blocking critical
# control-plane workloads. CRD webhooks (SecurityBaseline, WorkloadPolicy,
# TelemetryProfile) are not patched because platform teams intentionally
# manage those resources in any namespace.
#
# This patch is applied via kustomize and survives `make manifests`
# regeneration of manifests.yaml.
apiVersion: admissionregistration.k8s.io/v1
kind: MutatingWebhookConfiguration
metadata:
  name: mutating-webhook-configuration
webhooks:
- name: mpod.kb.io
  namespaceSelector:
    matchExpressions:
    - key: kubernetes.io/metadata.name
      operator: NotIn
      values:
      - kube-system
      - kube-public
      - kube-node-lease
---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  name: validating-webhook-configuration
webhooks:
- name: vpod.kb.io
  namespaceSelector:
    matchExpressions:
    - key: kubernetes.io/metadata.name
      operator: NotIn
      values:
      - kube-system
      - kube-public
      - kube-node-lease
